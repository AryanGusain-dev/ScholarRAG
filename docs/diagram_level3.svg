<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Level 3: Agentic RAG Architecture</title>
  <desc>Flowchart showing Agentic RAG with an intent router that either returns a casual greeting or proceeds to LLM query expansion, then two-stage Bi-Encoder wide search followed by Cross-Encoder re-ranking before synthesis.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; }
      .th { font-size: 14px; font-weight: 500; fill: #3d3d3a; }
      .ts { font-size: 12px; font-weight: 400; fill: #73726c; }
      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
      .c-teal rect  { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal .th   { fill: #085041; }
      .c-teal .ts   { fill: #0F6E56; }
      .c-purple rect{ fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th { fill: #3C3489; }
      .c-purple .ts { fill: #534AB7; }
      .c-blue rect  { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue .th   { fill: #0C447C; }
      .c-blue .ts   { fill: #185FA5; }
      .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
      .c-amber .th  { fill: #633806; }
      .c-amber .ts  { fill: #854F0B; }
      .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
      .c-coral .th  { fill: #712B13; }
      .c-coral .ts  { fill: #993C1D; }
      .c-gray rect  { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray .th   { fill: #2C2C2A; }
      .c-gray .ts   { fill: #444441; }
      .diamond { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
      .diamond-t { font-size: 13px; font-weight: 500; fill: #633806; font-family: sans-serif; }
      @media (prefers-color-scheme: dark) {
        .th { fill: #e8e6dc; }
        .ts { fill: #9c9a92; }
        .c-teal rect  { fill: #085041; stroke: #5DCAA5; }
        .c-teal .th   { fill: #9FE1CB; }
        .c-teal .ts   { fill: #5DCAA5; }
        .c-purple rect{ fill: #26215C; stroke: #AFA9EC; }
        .c-purple .th { fill: #CECBF6; }
        .c-purple .ts { fill: #AFA9EC; }
        .c-blue rect  { fill: #042C53; stroke: #85B7EB; }
        .c-blue .th   { fill: #B5D4F4; }
        .c-blue .ts   { fill: #85B7EB; }
        .c-amber rect { fill: #412402; stroke: #EF9F27; }
        .c-amber .th  { fill: #FAC775; }
        .c-amber .ts  { fill: #EF9F27; }
        .c-coral rect { fill: #4A1B0C; stroke: #F0997B; }
        .c-coral .th  { fill: #F5C4B3; }
        .c-coral .ts  { fill: #F0997B; }
        .c-gray rect  { fill: #2C2C2A; stroke: #888780; }
        .c-gray .th   { fill: #D3D1C7; }
        .c-gray .ts   { fill: #888780; }
        .diamond      { fill: #412402; stroke: #EF9F27; }
        .diamond-t    { fill: #FAC775; }
      }
    </style>
  </defs>

  <!-- User query -->
  <g class="c-teal">
    <rect x="260" y="20" width="160" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central">User query</text>
    <text class="ts" x="340" y="58" text-anchor="middle" dominant-baseline="central">Natural language input</text>
  </g>
  <line x1="340" y1="72" x2="340" y2="108" class="arr" marker-end="url(#arrow)"/>

  <!-- Intent router diamond -->
  <polygon points="340,120 400,150 340,180 280,150" class="diamond"/>
  <text class="diamond-t" x="340" y="151" text-anchor="middle" dominant-baseline="central">Intent router</text>

  <!-- Greeting branch (left) -->
  <path d="M280 150 L120 150 L120 200" class="arr" fill="none" marker-end="url(#arrow)"/>
  <text class="ts" x="196" y="144" text-anchor="middle">greeting</text>
  <g class="c-gray">
    <rect x="50" y="202" width="140" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="120" y="224" text-anchor="middle" dominant-baseline="central">Casual reply</text>
  </g>

  <!-- Research branch (right / down) -->
  <path d="M340 180 L340 218" class="arr" fill="none" marker-end="url(#arrow)"/>
  <text class="ts" x="356" y="204" text-anchor="start">research</text>

  <!-- Query expansion -->
  <g class="c-purple">
    <rect x="250" y="220" width="180" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="240" text-anchor="middle" dominant-baseline="central">LLM query expansion</text>
    <text class="ts" x="340" y="258" text-anchor="middle" dominant-baseline="central">Original + 3 variants</text>
  </g>
  <line x1="340" y1="272" x2="340" y2="298" class="arr" marker-end="url(#arrow)"/>

  <!-- Bi-Encoder -->
  <g class="c-blue">
    <rect x="220" y="300" width="240" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="320" text-anchor="middle" dominant-baseline="central">Bi-Encoder wide search</text>
    <text class="ts" x="340" y="338" text-anchor="middle" dominant-baseline="central">Top-5 per query retrieved</text>
  </g>

  <!-- arrow right to cross-encoder -->
  <line x1="460" y1="326" x2="498" y2="326" class="arr" marker-end="url(#arrow)"/>

  <!-- Cross-Encoder -->
  <g class="c-coral">
    <rect x="500" y="300" width="160" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="580" y="318" text-anchor="middle" dominant-baseline="central">Cross-Encoder</text>
    <text class="ts" x="580" y="336" text-anchor="middle" dominant-baseline="central">Re-rank → top-4</text>
  </g>

  <!-- Cross-encoder to final answer (L down) -->
  <path d="M580 352 L580 370 L340 370 L340 352" class="arr" fill="none" marker-end="url(#arrow)"/>

  <!-- final answer below bi-encoder -->
  <g class="c-teal">
    <rect x="220" y="354" width="240" height="38" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="373" text-anchor="middle" dominant-baseline="central">Strict prompt → Gemini → Answer</text>
  </g>
</svg>
