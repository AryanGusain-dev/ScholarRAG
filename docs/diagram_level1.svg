<svg width="100%" viewBox="0 0 680 380" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Level 1: Naive RAG Architecture</title>
  <desc>Flowchart showing the Naive RAG pipeline with two phases: Ingestion (PDF to fixed chunking to embedding to vector DB) and Retrieval and Synthesis (user query to embedding to vector DB to prompt template to Gemini LLM to final answer).</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; }
      .t  { font-size: 14px; font-weight: 400; fill: #3d3d3a; }
      .th { font-size: 14px; font-weight: 500; fill: #3d3d3a; }
      .ts { font-size: 12px; font-weight: 400; fill: #73726c; }
      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
      .box { fill: #F1EFE8; stroke: #888780; stroke-width: 0.5; }
      .c-teal rect  { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal .th   { fill: #085041; }
      .c-teal .ts   { fill: #0F6E56; }
      .c-purple rect{ fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th { fill: #3C3489; }
      .c-purple .ts { fill: #534AB7; }
      .c-blue rect  { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue .th   { fill: #0C447C; }
      .c-blue .ts   { fill: #185FA5; }
      .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
      .c-amber .th  { fill: #633806; }
      .c-amber .ts  { fill: #854F0B; }
      .phase-box    { fill: none; stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 5 4; }
      .phase-lbl    { font-size: 11px; font-weight: 500; fill: #888780; font-family: sans-serif; }
      @media (prefers-color-scheme: dark) {
        .t  { fill: #c2c0b6; }
        .th { fill: #e8e6dc; }
        .ts { fill: #9c9a92; }
        .arr { stroke: #888780; }
        .c-teal rect  { fill: #085041; stroke: #5DCAA5; }
        .c-teal .th   { fill: #9FE1CB; }
        .c-teal .ts   { fill: #5DCAA5; }
        .c-purple rect{ fill: #26215C; stroke: #AFA9EC; }
        .c-purple .th { fill: #CECBF6; }
        .c-purple .ts { fill: #AFA9EC; }
        .c-blue rect  { fill: #042C53; stroke: #85B7EB; }
        .c-blue .th   { fill: #B5D4F4; }
        .c-blue .ts   { fill: #85B7EB; }
        .c-amber rect { fill: #412402; stroke: #EF9F27; }
        .c-amber .th  { fill: #FAC775; }
        .c-amber .ts  { fill: #EF9F27; }
        .box          { fill: #2C2C2A; stroke: #5F5E5A; }
        .phase-box    { stroke: #5F5E5A; }
        .phase-lbl    { fill: #5F5E5A; }
      }
    </style>
  </defs>

  <!-- Ingestion phase container -->
  <rect class="phase-box" x="30" y="28" width="300" height="310" rx="10"/>
  <text class="phase-lbl" x="48" y="46">INGESTION PHASE</text>

  <!-- Retrieval phase container -->
  <rect class="phase-box" x="348" y="28" width="302" height="310" rx="10"/>
  <text class="phase-lbl" x="366" y="46">RETRIEVAL &amp; SYNTHESIS PHASE</text>

  <!-- Ingestion nodes -->
  <g class="c-teal">
    <rect x="60" y="60" width="160" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="140" y="83" text-anchor="middle" dominant-baseline="central">PDF document</text>
    <text class="ts" x="140" y="100" text-anchor="middle" dominant-baseline="central">Source paper</text>
  </g>

  <g class="c-purple">
    <rect x="60" y="150" width="160" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="140" y="170" text-anchor="middle" dominant-baseline="central">Fixed character</text>
    <text class="ts" x="140" y="188" text-anchor="middle" dominant-baseline="central">splitting</text>
  </g>

  <g class="c-blue">
    <rect x="60" y="240" width="160" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="140" y="260" text-anchor="middle" dominant-baseline="central">Embedding model</text>
    <text class="ts" x="140" y="278" text-anchor="middle" dominant-baseline="central">all-MiniLM-L6-v2</text>
  </g>

  <!-- Vector DB (shared) -->
  <g class="c-amber">
    <rect x="280" y="240" width="130" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="345" y="260" text-anchor="middle" dominant-baseline="central">Vector DB</text>
    <text class="ts" x="345" y="278" text-anchor="middle" dominant-baseline="central">ChromaDB (local)</text>
  </g>

  <!-- Retrieval nodes -->
  <g class="c-teal">
    <rect x="430" y="60" width="160" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="510" y="83" text-anchor="middle" dominant-baseline="central">User query</text>
    <text class="ts" x="510" y="100" text-anchor="middle" dominant-baseline="central">Natural language</text>
  </g>

  <g class="c-blue">
    <rect x="430" y="150" width="160" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="510" y="170" text-anchor="middle" dominant-baseline="central">Embedding model</text>
    <text class="ts" x="510" y="188" text-anchor="middle" dominant-baseline="central">Query vectorization</text>
  </g>

  <g class="c-purple">
    <rect x="430" y="240" width="160" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="510" y="256" text-anchor="middle" dominant-baseline="central">Strict prompt</text>
    <text class="ts" x="510" y="274" text-anchor="middle" dominant-baseline="central">template + top-3 chunks</text>
  </g>

  <!-- Final answer box below -->
  <g class="c-teal">
    <rect x="430" y="320" width="160" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="510" y="342" text-anchor="middle" dominant-baseline="central">Gemini 1.5 Flash → Answer</text>
  </g>

  <!-- Ingestion arrows -->
  <line x1="140" y1="112" x2="140" y2="148" class="arr" marker-end="url(#arrow)"/>
  <line x1="140" y1="202" x2="140" y2="238" class="arr" marker-end="url(#arrow)"/>
  <!-- embed to vector DB -->
  <line x1="220" y1="266" x2="278" y2="266" class="arr" marker-end="url(#arrow)"/>

  <!-- Retrieval arrows -->
  <line x1="510" y1="112" x2="510" y2="148" class="arr" marker-end="url(#arrow)"/>
  <!-- query embed down to vector DB (L-shaped to avoid collision) -->
  <path d="M510 202 L510 220 L345 220 L345 238" class="arr" fill="none" marker-end="url(#arrow)"/>
  <!-- vector DB to prompt (up and right) -->
  <path d="M410 266 L422 266 L422 266 L428 266" class="arr" fill="none" marker-end="url(#arrow)"/>
  <!-- prompt to answer -->
  <line x1="510" y1="292" x2="510" y2="318" class="arr" marker-end="url(#arrow)"/>

  <!-- Label on vector DB arrow from retrieval -->
  <text class="ts" x="465" y="214" text-anchor="middle">top-3 chunks</text>
</svg>
